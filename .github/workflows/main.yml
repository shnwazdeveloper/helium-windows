      - name: Run Stage
        id: stage
        uses: ./.github/actions/stage
        with:
          from_artifact: true
          arm: true
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
  build-arm-14:
    needs: build-arm-13
    if: needs.build-arm-13.outputs.finished == 'false'
    runs-on: ${{ github.event.inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Init
        run: Copy-Item -Path . -Destination "C:\helium-windows" -Recurse
      - name: Setup Stage
        run: npm install
        working-directory: ./.github/actions/stage
      - name: Run Stage
        id: stage
        uses: ./.github/actions/stage
        with:
          from_artifact: true
          arm: true
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
  build-arm-15:
    needs: build-arm-14
    if: needs.build-arm-14.outputs.finished == 'false'
    runs-on: ${{ github.event.inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Init
        run: Copy-Item -Path . -Destination "C:\helium-windows" -Recurse
      - name: Setup Stage
        run: npm install
        working-directory: ./.github/actions/stage
      - name: Run Stage
        id: stage
        uses: ./.github/actions/stage
        with:
          from_artifact: true
          arm: true
    outputs:
